<section class="auth-page">
  <div class="auth-copy">
    <p class="eyebrow">Controle financeiro</p>
    <h1>Gastos Control</h1>
    <p>Entradas, saidas, categorias e graficos em uma rotina simples para acompanhar o mes e o ano.</p>
  </div>

  <form class="auth-panel" [formGroup]="form" (ngSubmit)="submit()">
    <div class="mode-switch" role="tablist" aria-label="Autenticacao">
      <button type="button" [class.active]="mode === 'login'" (click)="changeMode('login')">Entrar</button>
      <button type="button" [class.active]="mode === 'register'" (click)="changeMode('register')">Criar conta</button>
    </div>

    <div class="field" *ngIf="mode === 'register'">
      <label for="name">Nome</label>
      <input id="name" type="text" formControlName="name" autocomplete="name">
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" autocomplete="email">
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input id="password" type="password" formControlName="password" autocomplete="current-password">
    </div>

    <p class="alert" *ngIf="error">{{ error }}</p>

    <button type="submit" class="primary-button" [disabled]="loading">
      {{ loading ? 'Processando...' : mode === 'login' ? 'Entrar' : 'Cadastrar' }}
    </button>
  </form>
</section>
