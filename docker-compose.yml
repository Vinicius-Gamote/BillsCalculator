services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gastos-control-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Gastos@12345!2026"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: backend/src/GastosControl.Api/Dockerfile
    container_name: gastos-control-api
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=GastosControlDb;User Id=sa;Password=Gastos@12345!2026;TrustServerCertificate=True;Encrypt=False;"
      Jwt__Issuer: "GastosControl"
      Jwt__Audience: "GastosControl.Client"
      Jwt__Secret: "docker-secret-for-gastos-control-2026-demo"
      Jwt__ExpirationMinutes: "180"
      Cors__AllowedOrigins__0: "http://localhost:4200"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: gastos-control-frontend
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  sqlserver-data:
